<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Enhanced Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .dashboard { display: flex; flex-direction: column; max-width: 800px; margin: auto; }
        .status { padding: 20px; margin: 10px 0; border-radius: 5px; color: white; font-weight: bold; }
        .error { background-color: red; }
        .warning { background-color: yellow; color: black; }
        .validated { background-color: green; }
        .suggestion { font-style: italic; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>File Validation Status</h1>
        <div class="status error">Error: Invalid file detected!</div>
        <div class="status warning">Warning: Potential issues found. <span class="suggestion">AI Suggestion: Review the file structure.</span></div>
        <div class="status validated">Validated: All files are in order.</div>
    </div>
</body>
</html>
